<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Joga Junto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: #0d0d1a; font-family: 'Nunito', sans-serif; color: #fff; padding: 1.5rem 1rem 3rem; }
    .wrap { max-width: 880px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 1.5rem; }
    .title { font-family: 'Fredoka One', cursive; font-size: clamp(2rem,6vw,3rem); background: linear-gradient(135deg,#FFD700,#FF8C00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.25rem; }
    .subtitle { font-size: 12px; color: #666; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

    .card { background: #161625; border: 2px solid #2a2a45; border-radius: 24px; padding: 1.75rem 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: #FFD700; margin-bottom: 1rem; display:flex; align-items:center; gap:8px; }

    .field { margin-bottom: 0.85rem; }
    .field label { display: block; font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: #888; margin-bottom: 4px; }
    .field input, .field textarea, .field select { width: 100%; background: #0d0d1a; border: 2px solid #2a2a45; border-radius: 12px; padding: 10px 14px; font-size: 14px; font-family: 'Nunito', sans-serif; color: #fff; outline: none; font-weight: 600; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: #FFD700; }

    .toggle-row { display:flex; align-items:center; justify-content:space-between; padding: 12px 14px; background:#0d0d1a; border:2px solid #2a2a45; border-radius: 12px; margin-bottom: 0.85rem; }
    .toggle-row label { font-weight:700; font-size: 13px; color:#cbc7bd; }
    .toggle { position:relative; width:50px; height:26px; background:#2a2a45; border-radius:13px; cursor:pointer; transition: background .2s; }
    .toggle::after { content:''; position:absolute; top:3px; left:3px; width:20px; height:20px; background:#fff; border-radius:50%; transition: transform .2s; }
    .toggle.on { background:linear-gradient(135deg,#FFD700,#FF8C00); }
    .toggle.on::after { transform: translateX(24px); }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }

    .btn { padding: 12px 18px; border: none; border-radius: 12px; font-family: 'Fredoka One', cursive; font-size: 14px; letter-spacing: 1px; cursor: pointer; }
    .btn-primary { background: linear-gradient(135deg,#FFD700,#FF8C00); color: #0d0d1a; }
    .btn-danger { background: rgba(255,69,0,0.15); color: #FF8C00; border: 1px solid rgba(255,69,0,0.35); }
    .btn-ghost { background: #1e1e30; color: #cbc7bd; border:1px solid #2a2a45; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn-vagas { flex: 1; padding: 12px; background: #0d0d1a; border: 2px solid #2a2a45; color: #cbc7bd; border-radius: 12px; font-family: 'Fredoka One', cursive; font-size: 14px; cursor: pointer; transition: all 0.15s; }
    .btn-vagas:hover { border-color: #FFD700; }
    .btn-vagas.active { background: linear-gradient(135deg,#FFD700,#FF8C00); color: #0d0d1a; border-color: transparent; }

    .msg { padding: 12px 14px; border-radius: 12px; margin-top: 0.75rem; font-size: 13px; font-weight: 700; text-align: center; display:none; }
    .msg.ok { background: rgba(0,230,100,0.15); color: #00e664; }
    .msg.err { background: rgba(255,69,0,0.15); color: #FF8C00; }

    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
    .status-badge.ativo  { background: rgba(0,230,100,0.15); color: #00e664; }
    .status-badge.inativo { background: rgba(100,100,100,0.15); color: #888; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 8px 6px; text-align: left; border-bottom: 1px solid #2a2a45; }
    th { color: #888; font-weight: 800; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
    td { color: #cbc7bd; }
    .entrega-status { padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 700; }
    .es-pendente  { background: rgba(255,180,0,0.15); color: #FFB400; }
    .es-enviado   { background: rgba(0,170,255,0.15); color: #4dbbff; }
    .es-entregue  { background: rgba(0,230,100,0.15); color: #00e664; }
    .es-cancelado { background: rgba(100,100,100,0.15); color: #888; }

    .login-card { max-width: 420px; margin: 4rem auto; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="title">🛠️ Admin</div>
      <div class="subtitle">Joga Junto · painel de controle</div>
    </div>

    <!-- LOGIN -->
    <div class="card login-card" id="login-card">
      <div class="card-title">🔐 Acesso restrito</div>
      <div class="field"><label>Senha</label><input type="password" id="login-senha" placeholder="••••••••"/></div>
      <button class="btn btn-primary" style="width:100%" onclick="login()">Entrar</button>
      <div class="msg" id="login-msg"></div>
    </div>

    <!-- PAINEL -->
    <div id="painel" class="hidden">
      <!-- CONFIG -->
      <div class="card">
        <div class="card-title">⚙️ Desafio atual <span id="status-cur" class="status-badge inativo">--</span></div>

        <div class="field"><label>📍 Nome do desafio</label><input type="text" id="cfg-desafio" placeholder="Parque Ibirapuera #02"/></div>

        <div class="row">
          <div class="field"><label>🎁 Prêmio</label><input type="text" id="cfg-premio" placeholder="Fone Bluetooth"/></div>
          <div class="field"><label>📅 Abertura</label><input type="datetime-local" id="cfg-abertura"/></div>
        </div>

        <div class="row">
          <div class="field"><label>🔢 Gabarito (resposta correta)</label><input type="number" id="cfg-gabarito" min="0"/></div>
          <div class="field"><label>🤫 Código secreto</label><input type="text" id="cfg-codigo" placeholder="IBIRA02" style="text-transform:uppercase"/></div>
        </div>

        <div class="field">
          <label>🏆 Quantidade de vencedores</label>
          <div style="display:flex;gap:10px;">
            <button type="button" class="btn-vagas" data-val="5"  onclick="setVagas(5)">5 vencedores</button>
            <button type="button" class="btn-vagas" data-val="10" onclick="setVagas(10)">10 vencedores</button>
          </div>
        </div>

        <div class="toggle-row">
          <label>Desafio ativo no site</label>
          <div class="toggle" id="cfg-ativo" onclick="this.classList.toggle('on')"></div>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" onclick="salvar()">💾 Salvar e ativar</button>
          <button class="btn btn-ghost" onclick="carregar()">🔄 Recarregar</button>
          <button class="btn btn-danger" onclick="limparGanhadores()">🧹 Zerar respostas</button>
          <button class="btn btn-ghost" onclick="sair()" style="margin-left:auto">Sair</button>
        </div>
        <div class="msg" id="cfg-msg"></div>
      </div>

      <!-- ENTREGAS -->
      <div class="card">
        <div class="card-title">📦 Entregas do desafio atual</div>
        <div class="btn-row" style="margin-bottom: 0.75rem;">
          <button class="btn btn-ghost" onclick="carregarEntregas()">🔄 Atualizar lista</button>
          <button class="btn btn-ghost" onclick="exportarCSV()">📋 Exportar CSV</button>
        </div>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Cidade/UF</th>
                <th>Rastreio</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="ent-tbody">
              <tr><td colspan="5" style="text-align:center;color:#555;padding:1rem;">Aguardando...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="msg" id="ent-msg"></div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://xcwftyikbrioyrgrkiaj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhjd2Z0eWlrYnJpb3lyZ3JraWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Mjg0MDcsImV4cCI6MjA5NTMwNDQwN30._-y6vqfl2i06u80jn9Wbp_m5QfV3kzueuNLa4Muecdk';

    let SENHA = sessionStorage.getItem('jj_senha') || '';
    let ENTREGAS_CACHE = [];
    let TOTAL_VENCEDORES = 10;

    function setVagas(n){
      TOTAL_VENCEDORES = n;
      document.querySelectorAll('.btn-vagas').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.val) === n);
      });
    }

    function $(id){ return document.getElementById(id); }
    function showMsg(elId, text, type){
      const m = $(elId);
      m.textContent = text;
      m.className = 'msg ' + type;
      m.style.display = 'block';
      setTimeout(()=>{ m.style.display='none'; }, 4000);
    }

    async function rpc(name, payload){
      const res = await fetch(SUPABASE_URL+'/rest/v1/rpc/'+name, {
        method:'POST',
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
      return res.json();
    }

    async function login(){
      const s = $('login-senha').value.trim();
      if(!s){ showMsg('login-msg','Digite a senha','err'); return; }
      const r = await rpc('admin_get_config', { p_senha: s });
      if(r.status === 'ok'){
        SENHA = s;
        sessionStorage.setItem('jj_senha', s);
        $('login-card').classList.add('hidden');
        $('painel').classList.remove('hidden');
        preencherForm(r.data);
        carregarEntregas();
      } else {
        showMsg('login-msg','Senha incorreta','err');
      }
    }

    function sair(){
      sessionStorage.removeItem('jj_senha');
      SENHA = '';
      location.reload();
    }

    function preencherForm(c){
      $('cfg-desafio').value  = c.desafio || '';
      $('cfg-premio').value   = c.premio || '';
      $('cfg-gabarito').value = c.gabarito ?? '';
      $('cfg-codigo').value   = c.codigo_secreto || '';
      if(c.abertura){
        const d = new Date(c.abertura);
        const pad = n => String(n).padStart(2,'0');
        $('cfg-abertura').value = d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
      }
      const toggle = $('cfg-ativo');
      toggle.classList.toggle('on', !!c.ativo);
      const badge = $('status-cur');
      badge.textContent = c.ativo ? '● Ativo' : '● Inativo';
      badge.className = 'status-badge ' + (c.ativo ? 'ativo' : 'inativo');
      setVagas(c.total_vencedores || 10);
    }

    async function carregar(){
      const r = await rpc('admin_get_config', { p_senha: SENHA });
      if(r.status === 'ok'){ preencherForm(r.data); showMsg('cfg-msg','Recarregado','ok'); }
      else if(r.status === 'unauthorized'){ sair(); }
    }

    async function salvar(){
      const ab = $('cfg-abertura').value;
      const payload = {
        p_senha: SENHA,
        p_desafio: $('cfg-desafio').value.trim(),
        p_abertura: ab ? new Date(ab).toISOString() : null,
        p_premio: $('cfg-premio').value.trim(),
        p_gabarito: parseInt($('cfg-gabarito').value) || 0,
        p_codigo_secreto: $('cfg-codigo').value.trim().toUpperCase(),
        p_ativo: $('cfg-ativo').classList.contains('on'),
        p_total_vencedores: TOTAL_VENCEDORES
      };
      const r = await rpc('admin_save_config', payload);
      if(r.status === 'ok'){
        showMsg('cfg-msg','Config salva com sucesso!','ok');
        carregar();
      } else if(r.status === 'unauthorized'){ sair(); }
      else { showMsg('cfg-msg','Erro ao salvar','err'); }
    }

    async function limparGanhadores(){
      if(!confirm('Apagar TODAS as respostas do desafio atual?')) return;
      const r = await rpc('admin_clear_winners', { p_senha: SENHA });
      if(r.status === 'ok'){
        showMsg('cfg-msg', r.removidas + ' respostas removidas', 'ok');
        carregarEntregas();
      } else if(r.status === 'unauthorized'){ sair(); }
      else { showMsg('cfg-msg','Erro','err'); }
    }

    async function carregarEntregas(){
      const r = await rpc('admin_list_entregas', { p_senha: SENHA });
      if(r.status === 'unauthorized'){ sair(); return; }
      ENTREGAS_CACHE = r.data || [];
      renderEntregas();
    }

    function renderEntregas(){
      const tbody = $('ent-tbody');
      if(!ENTREGAS_CACHE.length){
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#555;padding:1rem;">Nenhuma entrega ainda</td></tr>';
        return;
      }
      tbody.innerHTML = ENTREGAS_CACHE.map(e => `
        <tr>
          <td><strong>${escape(e.nome_completo)}</strong><br><span style="color:#555;font-size:11px;">${escape(e.email)}</span></td>
          <td>${escape(e.cidade)}/${escape(e.uf)}<br><span style="color:#555;font-size:11px;">${escape(e.cep)}</span></td>
          <td><input type="text" placeholder="Cód. rastreio" value="${escape(e.codigo_rastreio||'')}" id="ras-${e.id}" style="width:130px;background:#0d0d1a;border:1px solid #2a2a45;color:#fff;padding:6px 8px;border-radius:8px;font-size:11px;"/></td>
          <td><span class="entrega-status es-${e.status}">${e.status}</span></td>
          <td>
            <select onchange="atualizarStatus('${e.id}', this.value)" style="background:#0d0d1a;border:1px solid #2a2a45;color:#fff;padding:6px;border-radius:8px;font-size:11px;">
              <option value="">Status...</option>
              <option value="pendente">Pendente</option>
              <option value="enviado">Enviado</option>
              <option value="entregue">Entregue</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </td>
        </tr>
      `).join('');
    }

    function escape(s){ return String(s||'').replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'})[c]); }

    async function atualizarStatus(id, status){
      if(!status) return;
      const rastreio = $('ras-'+id).value.trim();
      const r = await rpc('admin_update_entrega_status', { p_senha: SENHA, p_entrega_id: id, p_status: status, p_codigo_rastreio: rastreio });
      if(r.status === 'ok'){ showMsg('ent-msg','Status atualizado','ok'); carregarEntregas(); }
      else if(r.status === 'unauthorized'){ sair(); }
      else { showMsg('ent-msg','Erro','err'); }
    }

    function exportarCSV(){
      if(!ENTREGAS_CACHE.length){ showMsg('ent-msg','Nada pra exportar','err'); return; }
      const cols = ['nome_completo','email','cpf','telefone','cep','logradouro','numero','complemento','bairro','cidade','uf','status','codigo_rastreio','criado_em'];
      const header = cols.join(';');
      const rows = ENTREGAS_CACHE.map(e => cols.map(c => '"'+String(e[c]||'').replace(/"/g,'""')+'"').join(';'));
      const csv = '﻿' + header + '\n' + rows.join('\n');
      const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'entregas-jogajunto.csv';
      a.click();
    }

    // Auto-login se senha cached
    if(SENHA){
      rpc('admin_get_config', { p_senha: SENHA }).then(r => {
        if(r.status === 'ok'){
          $('login-card').classList.add('hidden');
          $('painel').classList.remove('hidden');
          preencherForm(r.data);
          carregarEntregas();
        } else {
          sessionStorage.removeItem('jj_senha');
        }
      });
    }
  </script>
</body>
</html>
